services:
  - type: web
    name: thailinda-api
    runtime: ruby
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: bundle install
    startCommand: bin/rails db:migrate && bin/rails db:seed && bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: thailinda-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_MAX_THREADS
        value: 5
      - key: RAILS_MASTER_KEY
        sync: false
      - key: TYPHOON_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false

databases:
  - name: thailinda-db
    region: singapore
    plan: free
    databaseName: thailinda_production
    user: thailinda
