<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1559c7">
  <title>ผลการเรียน | ThaiLinda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@0..1" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/student.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <a class="brand" href="007.html" aria-label="ThaiLinda หน้าบทเรียน">
        <span class="brand__mascot"><img src="../../assets/images/thailinda-mascot.png" alt=""></span><span>ThaiLinda</span>
      </a>
      <div class="student-pill"><span class="material-symbols-rounded" aria-hidden="true">waving_hand</span><span>สวัสดี <span data-student-name></span></span></div>
    </div>
  </header>

  <main class="page-shell page-shell--narrow">
    <p class="eyebrow">ผลจากการฝึกจริง</p>
    <h1 class="page-title">ผลการเรียนของฉัน</h1>
    <p class="page-subtitle" id="resultMessage">เริ่มบทเรียนแรก แล้วผลการฝึกจะมาอยู่ตรงนี้</p>

    <section class="summary-grid" aria-label="สรุปผลการเรียน">
      <div class="summary-card"><strong id="resultPassed">0/10</strong><span>คำที่ผ่านจริง</span></div>
      <div class="summary-card"><strong id="resultAttempts">0</strong><span>จำนวนครั้งที่ลอง</span></div>
      <div class="summary-card"><strong id="resultPractice">0</strong><span>คำที่ควรฝึกเพิ่ม</span></div>
    </section>

    <section aria-labelledby="wordResultsTitle">
      <div class="section-heading"><div><h2 id="wordResultsTitle">ผลรายคำ</h2><p>กดปุ่มเล่นเพื่อฝึกคำเดิมอีกครั้ง</p></div></div>
      <div class="result-list" id="resultList"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="เมนูนักเรียน">
    <a href="007.html"><span class="material-symbols-rounded" aria-hidden="true">menu_book</span><span>บทเรียน</span></a>
    <a href="010.html" aria-current="page"><span class="material-symbols-rounded" aria-hidden="true">monitoring</span><span>ผลการเรียน</span></a>
    <a href="011.html"><span class="material-symbols-rounded" aria-hidden="true">person</span><span>โปรไฟล์</span></a>
  </nav>

  <script type="module" src="../assets/js/results.js"></script>
