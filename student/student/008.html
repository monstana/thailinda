<body class="bg-background text-on-background min-h-screen flex flex-col overflow-x-hidden">
    <!-- Top App Bar -->
    <header
        class="docked full-width top-0 bg-background flex justify-between items-center w-full px-margin-mobile py-4 sticky z-40">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full overflow-hidden border-4 border-primary-container bg-surface-container">
                <img alt="Friendly mascot elephant" class="w-full h-full object-cover"
                    data-alt="A charming and friendly cartoon elephant mascot with large sparkling eyes and a wide, cheerful smile. The character is rendered in a soft, 3D claymation style with vibrant blue and yellow accents. The background is a clean, bright white space typical of a modern educational app, illuminated by soft, warm lighting that emphasizes the tactile, rounded quality of the mascot."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAnj4TuQw8nSUGnaHbfgHbPYQvbDAo1rufb3lvwrwZQFTt-pbsojfnCpi77DauHp9borM8pYoyDbh7_rFlgf83V2qwZyToge0vA8CLQoodYpZm-FuVvOJQx-GtIwIwXPkfi-oQmNsFxsCeCfkOBUUhqvJILfwee83RAZVOOhUByKDQPyopwYFErTnAynfguBHm7-VsEfRt3TvezpwjP6NF3Y5tEuPya3tdlR4eC3-6FjD0dwHpUTQEI0to8BhwqmEDQnKeCtwJvzB0">
            </div>
            <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">ไทยลินดา</h1>
        </div>
        <button
            class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-container hover:opacity-90 transition-all">
            <span class="material-symbols-outlined text-primary text-3xl" data-icon="stars">stars</span>
        </button>
    </header>
    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col items-center justify-center px-margin-mobile pb-24">
        <!-- Header Title -->
        <div class="w-full text-center mb-8">
            <h2 class="font-headline-md text-headline-md text-on-surface">ห้องเรียนของฉัน</h2>
        </div>
        <!-- Empty State Illustration & Message -->
        <div class="flex-1 flex flex-col items-center justify-center space-y-8 animate-fade-in">
            <div class="relative w-64 h-64 md:w-80 md:h-80 flex items-center justify-center">
                <!-- Background decorative elements -->
                <div class="absolute inset-0 bg-primary-container opacity-20 rounded-full blur-3xl"></div>
                <div
                    class="z-10 bg-white p-6 rounded-xl chunky-shadow transform -rotate-3 hover:rotate-0 transition-transform duration-300">
                    <img class="w-48 h-48 rounded-lg"
                        data-alt="A whimsical and vibrant 3D illustration of a school building with oversized, rounded windows and a friendly yellow door. The style is tactile and playful, resembling a high-quality physical toy set made of smooth, semi-matte plastic. The colors are dominated by bright primary yellow and soft blue, set against a warm off-white background with gentle ambient shadows that make the schoolhouse feel solid and pressable."
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBllVO8fQZivh6D88_f4CoUFHBGwAu3DXi31mOq-NM96bjVBPmapwPsJFbmWKXJp1LK7sJ8yWDOmxXITtzQKvhOKaeeKSrbSyR5GHDJD7JAUXE-C3ewyenLG_pVYa0e5FK9fIaAmUKwbnL1XLI3aFayMNq4-biZ6Bd7jCiLj-cw5clP78Hqr4esq8pakRJFOEbWA_T1SKmwarzYYpoYN0Clmy9weU8fV0xhbfE-5KWmJlc1N6sk6ExEHf9H24RG1oqE3-7akUy_Jrk">
                </div>
                <!-- Small character popping up -->
                <div class="absolute -bottom-4 -right-4 z-20">
                    <div
                        class="bg-tertiary-container text-on-tertiary-container px-4 py-2 rounded-xl chunky-shadow font-label-lg text-label-lg flex items-center gap-2">
                        <span class="">มาเริ่มกันเถอะ!</span>
                        <span class="material-symbols-outlined" data-icon="waving_hand">waving_hand</span>
                    </div>
                </div>
            </div>
            <div class="text-center max-w-xs space-y-4">
                <p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed">
                    เธอยังไม่ได้เข้าร่วมห้องเรียนเลยนะจ๊ะ มาหาคุณครูและเพื่อนๆ กันเถอะ!
                </p>
            </div>
        </div>

    </main>
    <!-- Bottom Navigation Bar -->
    <nav
        class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-surface-container-lowest shadow-[0_-4px_0_0_rgba(0,0,0,0.05)] border-t-4 border-outline-variant rounded-t-lg">
        <!-- บทเรียน -->
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant px-2 py-2 transition-all flex-1"
            href="#">
            <span class="material-symbols-outlined mb-1">menu_book</span>
            <span class="text-[12px] font-label-lg">บทเรียน</span>
        </a>
        <!-- ห้องเรียน (Active) -->
        <a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl px-2 py-2 transition-all flex-1 font-bold"
            href="#">
            <span class="material-symbols-outlined mb-1">school</span>
            <span class="text-[12px] font-label-lg">ห้องเรียน</span>
        </a>
        <!-- ผลการเรียน -->
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant px-2 py-2 transition-all flex-1"
            href="#">
            <span class="material-symbols-outlined mb-1">star</span>
            <span class="text-[12px] font-label-lg">ผลการเรียน</span>
        </a>
        <!-- โปรไฟล์ -->
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant px-2 py-2 transition-all flex-1"
            href="#">
            <span class="material-symbols-outlined mb-1">person</span>
            <span class="text-[12px] font-label-lg">โปรไฟล์</span>
        </a>
    </nav>
    <script>
        // Micro-interactions for tactile buttons
        document.querySelectorAll('button, a').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.classList.add('scale-95');
            });
            btn.addEventListener('mouseup', () => {
                btn.classList.remove('scale-95');
            });
            btn.addEventListener('touchstart', () => {
                btn.classList.add('scale-95');
            });
            btn.addEventListener('touchend', () => {
                btn.classList.remove('scale-95');
            });
        });
    </script>

</html>
