<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }

        .chunky-shadow-primary {
            box-shadow: 0 4px 0 0 #544600;
        }

        .chunky-shadow-secondary {
            box-shadow: 0 4px 0 0 #7a3000;
        }

        .chunky-shadow-tertiary {
            box-shadow: 0 4px 0 0 #005313;
        }

        .chunky-shadow-error {
            box-shadow: 0 4px 0 0 #93000a;
        }

        .floating-animation {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .bounce-hover:hover {
            transform: scale(1.02) translateY(-4px);
        }

        .press-effect:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 transparent;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 999px;
            opacity: 0.6;
            z-index: -1;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#d0c6ab",
                        "on-secondary-fixed-variant": "#7a3000",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#ffe170",
                        "secondary-fixed": "#ffdbcc",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#eae7e7",
                        "primary": "#705d00",
                        "inverse-primary": "#e9c400",
                        "on-tertiary-container": "#006e1c",
                        "surface-tint": "#705d00",
                        "outline": "#7f775f",
                        "on-secondary-container": "#572000",
                        "on-primary-fixed-variant": "#544600",
                        "on-error": "#ffffff",
                        "inverse-surface": "#303030",
                        "tertiary-fixed-dim": "#42e355",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#f0eded",
                        "on-primary-container": "#705d00",
                        "primary-fixed-dim": "#e9c400",
                        "surface-container-low": "#f6f3f2",
                        "inverse-on-surface": "#f3f0f0",
                        "on-tertiary-fixed": "#002204",
                        "surface-variant": "#e4e2e1",
                        "on-primary-fixed": "#221b00",
                        "on-surface": "#1b1c1c",
                        "secondary": "#a04100",
                        "tertiary-fixed": "#70ff76",
                        "tertiary": "#006e1c",
                        "primary-container": "#ffd600",
                        "surface-container-highest": "#e4e2e1",
                        "secondary-fixed-dim": "#ffb693",
                        "on-secondary-fixed": "#351000",
                        "surface-bright": "#ffffff",
                        "background": "#ffffff",
                        "surface-dim": "#ffffff",
                        "surface": "#ffffff",
                        "on-background": "#1b1c1c",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#4d4632",
                        "secondary-container": "#fe6b00",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#59f766",
                        "on-tertiary-fixed-variant": "#005313",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "40px",
                        "md": "24px",
                        "gutter": "20px",
                        "xl": "64px",
                        "margin-desktop": "48px",
                        "base": "8px",
                        "margin-mobile": "16px",
                        "xs": "4px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "body-md": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "headline-xl": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "500" }],
                        "label-caps": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "800" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "fontWeight": "800" }],
                        "headline-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-surface min-h-screen font-body-md overflow-x-hidden">
    <!-- Background Elements -->
    <div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
        <div class="cloud w-32 h-12 top-20 left-10 floating-animation" style="animation-delay: 0s;"></div>
        <div class="cloud w-48 h-16 top-40 -right-10 floating-animation" style="animation-delay: 1s;"></div>
        <div class="cloud w-40 h-14 bottom-60 left-1/4 floating-animation" style="animation-delay: 2s;"></div>
        <div class="absolute top-20 right-20 text-primary-container opacity-30">
            <span class="material-symbols-outlined text-xl" style="font-size: 80px;">star</span>
        </div>
        <div class="absolute bottom-40 left-10 text-secondary-container opacity-20">
            <span class="material-symbols-outlined text-xl" style="font-size: 120px;">circle</span>
        </div>
    </div>
    <!-- TopAppBar -->
    <header
        class="fixed top-0 left-0 w-full z-50 bg-surface flex justify-between items-center px-margin-mobile h-[64px] shadow-[0_4px_0_0_rgba(0,0,0,0.05)]">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
                <img alt="Mascot" class="w-8 h-8 object-contain"
                    data-alt="A friendly and cute cartoon elephant character with large expressive eyes and a warm smile, wearing a traditional Thai silk scarf. The character is rendered in a soft 3D claymorphic style with bright, cheerful colors against a warm off-white background, embodying the 'Educational Joy' brand identity. The lighting is high-key and soft, creating a welcoming and safe atmosphere for young learners."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGxRMTy1gtO_IIGih1QfCYRS2kRb9lPf7K19e5ZlxeMaNtxHcVthnrSWOCvL5o426Nr5RyP9AAUcwD3ZHlnwVkUX3f4YSxYYurqmofNK3ALP0DBH--5AZ2VhPomZwnjF6wAxpw8x1CZ7v-kx-BiDlmB_Oym_JqwvsOz2DmSESb89ZmWHv6BCC2tFYjoPEI9Krd4pgFSPHX0XJInSakkZa1jLxDzODxYkL2wvEPe83dHocQMpz5O4rufg4jt_fNQw7-jE__GOtNNt0">
            </div>
            <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">ไทยลินดา</h1>
        </div>
        <button
            class="material-symbols-outlined text-primary hover:opacity-80 active:translate-y-1 transition-transform"
            data-icon="stars">stars</button>
    </header>
    <main class="max-w-4xl mx-auto px-margin-mobile pt-[88px] pb-40">
        <!-- Screen Title -->
        <div class="text-center mb-xl">
            <h2 class="font-headline-xl text-headline-lg-mobile md:text-headline-xl text-primary mb-xs">เลือกประโยคหรรษา
            </h2>
            <p class="text-on-surface-variant font-body-lg">ฝึกอ่านประโยคสนุกๆ ไปกับเพื่อนช้างกันเถอะ!</p>
        </div>
        <!-- Sentence Grid (Bento Style) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
            <!-- Card 1 -->
            <button
                class="group relative flex flex-col items-start p-md bg-surface-container-lowest border-4 border-tertiary rounded-lg chunky-shadow-tertiary bounce-hover press-effect transition-all text-left">
                <div class="mb-sm bg-tertiary-container p-sm rounded-full">
                    <span class="material-symbols-outlined text-tertiary text-4xl" data-weight="fill">phishing</span>
                </div>
                <h3 class="font-headline-md text-headline-md text-on-surface mb-xs">ตากามาหาปลา</h3>
                <div class="absolute top-4 right-4 opacity-10 group-hover:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-tertiary text-6xl">water_drop</span>
                </div>
            </button>
            <!-- Card 2 -->
            <button
                class="group relative flex flex-col items-start p-md bg-surface-container-lowest border-4 border-secondary rounded-lg chunky-shadow-secondary bounce-hover press-effect transition-all text-left">
                <div class="mb-sm bg-secondary-fixed p-sm rounded-full">
                    <span class="material-symbols-outlined text-secondary text-4xl" data-weight="fill">home_pin</span>
                </div>
                <h3 class="font-headline-md text-headline-md text-on-surface mb-xs">น้าพาอามาบ้าน</h3>
                <div class="absolute top-4 right-4 opacity-10 group-hover:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-secondary text-6xl">family_restroom</span>
                </div>
            </button>
            <!-- Card 3 -->
            <button
                class="group relative flex flex-col items-start p-md bg-surface-container-lowest border-4 border-primary rounded-lg chunky-shadow-primary bounce-hover press-effect transition-all text-left">
                <div class="mb-sm bg-primary-fixed p-sm rounded-full">
                    <span class="material-symbols-outlined text-primary text-4xl" data-weight="fill">pets</span>
                </div>
                <h3 class="font-headline-md text-headline-md text-on-surface mb-xs">หมาคาบปลาไป</h3>
                <div class="absolute top-4 right-4 opacity-10 group-hover:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-primary text-6xl">set_meal</span>
                </div>
            </button>
            <!-- Card 4 -->
            <button
                class="group relative flex flex-col items-start p-md bg-surface-container-lowest border-4 border-error rounded-lg chunky-shadow-error bounce-hover press-effect transition-all text-left">
                <div class="mb-sm bg-error-container p-sm rounded-full">
                    <span class="material-symbols-outlined text-error text-4xl" data-weight="fill">wb_sunny</span>
                </div>
                <h3 class="font-headline-md text-headline-md text-on-surface mb-xs">ตาสามีนาห้าใบ</h3>
                <div class="absolute top-4 right-4 opacity-10 group-hover:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-error text-6xl">potted_plant</span>
                </div>
            </button>
        </div>

    </main>

    <script>
        // Simple micro-interaction for cards
        document.querySelectorAll('button.group').forEach(button => {
            button.addEventListener('click', function () {
                // Flash effect
                this.classList.add('bg-primary-fixed');
                setTimeout(() => {
                    this.classList.remove('bg-primary-fixed');
                }, 200);
            });
        });

        // Generate some random stars for the background
        const bg = document.querySelector('.fixed.inset-0');
        for (let i = 0; i < 15; i++) {
            const star = document.createElement('span');
            star.className = 'material-symbols-outlined absolute text-primary-container opacity-20 floating-animation';
            star.style.fontSize = Math.random() * 24 + 12 + 'px';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.innerText = 'star';
            bg.appendChild(star);
        }
    </script>
</body>

</html>
