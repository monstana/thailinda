<!DOCTYPE html>
<html lang="th" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#e8c426",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#221b00",
                        "primary-fixed": "#ffe173",
                        "surface-variant": "#dbe1ff",
                        "on-secondary-fixed-variant": "#00468c",
                        "on-secondary-container": "#002e60",
                        "tertiary-container": "#8ff199",
                        "surface-container": "#ebedff",
                        "tertiary-fixed-dim": "#7bdb85",
                        "on-tertiary-container": "#00702a",
                        "secondary-fixed-dim": "#a9c7ff",
                        "secondary-fixed": "#d6e3ff",
                        "on-background": "#131a32",
                        "on-tertiary-fixed-variant": "#00531d",
                        "error": "#ba1a1a",
                        "surface-dim": "#d2d9f8",
                        "on-primary-container": "#725e00",
                        "background": "#faf8ff",
                        "surface": "#faf8ff",
                        "surface-container-highest": "#dbe1ff",
                        "secondary": "#005db8",
                        "on-surface": "#131a32",
                        "surface-container-low": "#f3f3ff",
                        "surface-tint": "#705d00",
                        "on-error": "#ffffff",
                        "inverse-surface": "#282f48",
                        "primary-container": "#ffd93d",
                        "outline": "#7e7761",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#e8c426",
                        "tertiary-fixed": "#96f89f",
                        "on-tertiary-fixed": "#002107",
                        "secondary-container": "#4c96fe",
                        "on-tertiary": "#ffffff",
                        "primary": "#705d00",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#554500",
                        "on-surface-variant": "#4d4633",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e3e7ff",
                        "on-secondary-fixed": "#001b3e",
                        "surface-bright": "#faf8ff",
                        "inverse-on-surface": "#eff0ff",
                        "tertiary": "#006e29",
                        "outline-variant": "#d0c6ad"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "card-padding": "20px",
                        "touch-target-min": "56px",
                        "gutter": "24px",
                        "margin-mobile": "24px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "display-thai": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "800" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "display-thai": ["48px", { "lineHeight": "60px", "fontWeight": "800" }],
                        "body-md": ["18px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "body-lg": ["20px", { "lineHeight": "30px", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-lg": ["16px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700" }]
                    }
                },
            },
        }
    </script>
    <style>
        .chunky-shadow {
            box-shadow: 0 6px 0 0 rgba(112, 93, 0, 0.3);
        }

        .chunky-shadow:active {
            box-shadow: 0 0px 0 0 rgba(112, 93, 0, 0.3);
            transform: translateY(6px);
        }

        .chunky-shadow-secondary {
            box-shadow: 0 6px 0 0 rgba(0, 93, 184, 0.3);
        }

        .chunky-shadow-secondary:active {
            box-shadow: 0 0px 0 0 rgba(0, 93, 184, 0.3);
            transform: translateY(6px);
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        .mic-pulse::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 9999px;
            background-color: #ffd93d;
            animation: pulse-ring 2s infinite;
            z-index: -1;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary-container">
    <!-- TopAppBar Shell -->
    <nav class="bg-background flex justify-between items-center w-full px-margin-mobile py-4 sticky top-0 z-50">
        <div class="flex items-center gap-4">

            <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">ไทยลินดา</h1>
        </div>
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-3xl" data-icon="stars">stars</span>
        </div>
    </nav>
    <!-- Quiz Progress Header -->
    <header class="px-margin-mobile pt-4 pb-2">
        <div class="flex items-center justify-between mb-2">
            <span class="font-label-lg text-label-lg text-primary">ความคืบหน้า</span>
            <span class="font-label-lg text-label-lg text-secondary">3/10</span>
        </div>
        <!-- Progress Bar Component -->
        <div class="h-4 w-full bg-surface-container rounded-full overflow-hidden relative">
            <div class="h-full bg-tertiary-fixed-dim rounded-full transition-all duration-500 flex items-center justify-end"
                style="width: 30%;">
                <div
                    class="w-6 h-6 bg-tertiary rounded-full border-2 border-on-primary transform translate-x-2 shadow-sm flex items-center justify-center">
                    <span class="material-symbols-outlined text-[14px] text-on-tertiary" data-icon="auto_awesome"
                        style="font-variation-settings: &quot;FILL&quot; 1;">auto_awesome</span>
                </div>
            </div>
        </div>
    </header>
    <main class="px-margin-mobile py-6 flex flex-col gap-gutter">
        <!-- Question Section -->
        <section class="text-center space-y-4">
            <p class="font-headline-md text-headline-md text-on-surface-variant">คำนี้อ่านออกเสียงว่าอย่างไร?</p>
            <!-- Word Display Card -->
            <div
                class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-8 shadow-sm flex flex-col items-center justify-center min-h-[200px]">
                <h2 class="font-display-thai text-[80px] leading-none text-primary mb-4">ก</h2>
                <p class="font-headline-md text-2xl text-on-surface-variant">ก-ไก่ (กอ)</p>
                <div class="flex items-center gap-2 text-on-surface-variant opacity-60"></div>
            </div>
        </section>
        <!-- Voice Interaction Block -->
        <section class="flex flex-col items-center py-8">
            <div class="flex gap-8 items-center justify-center">
                <div class="flex flex-col items-center gap-2">
                    <button
                        class="w-20 h-20 bg-secondary-container rounded-full flex items-center justify-center chunky-shadow-secondary transition-all group active:translate-y-1">
                        <span
                            class="material-symbols-outlined text-on-secondary-container text-4xl group-hover:scale-110 transition-transform"
                            data-icon="volume_up">volume_up</span>
                    </button>
                    <span class="font-label-lg text-label-lg text-secondary">ฟัง</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <button
                        class="relative mic-pulse w-20 h-20 bg-primary-container rounded-full flex items-center justify-center chunky-shadow transition-all group active:translate-y-1"
                        id="micButton">
                        <span
                            class="material-symbols-outlined text-on-primary-container text-4xl group-hover:scale-110 transition-transform"
                            data-icon="mic" style="font-variation-settings: &quot;FILL&quot; 1;">mic</span>
                    </button>
                    <span class="font-label-lg text-label-lg text-primary">พูด</span>
                </div>
            </div>
            <p class="mt-6 font-label-lg text-label-lg text-on-surface-variant animate-pulse">กำลังฟังอยู่...</p>
        </section>
        <!-- Options Bento Grid -->

    </main>
    <!-- BottomNavBar Shell -->

    <script>
        // Micro-interactions
        const micButton = document.getElementById('micButton');
        let isRecording = false;

        micButton.addEventListener('click', () => {
            isRecording = !isRecording;
            if (isRecording) {
                micButton.classList.remove('bg-primary-container');
                micButton.classList.add('bg-error-container');
                micButton.querySelector('span').classList.replace('text-on-primary-container', 'text-error');
                micButton.nextElementSibling.textContent = "กำลังฟังอยู่...";
                micButton.nextElementSibling.classList.add('text-error');
            } else {
                micButton.classList.add('bg-primary-container');
                micButton.classList.remove('bg-error-container');
                micButton.querySelector('span').classList.replace('text-error', 'text-on-primary-container');
                micButton.nextElementSibling.textContent = "กดค้างไว้เพื่อพูด...";
                micButton.nextElementSibling.classList.remove('text-error');
            }
        });

        // Add feedback sound effect simulation
        const options = document.querySelectorAll('button.chunky-shadow-secondary');
        options.forEach(option => {
            option.addEventListener('click', () => {
                // Flash effect for correct/incorrect
                const isCorrect = option.innerText.includes('ไก่');
                if (isCorrect) {
                    option.classList.add('bg-tertiary-container', 'border-tertiary');
                    setTimeout(() => {
                        option.classList.remove('bg-tertiary-container', 'border-tertiary');
                    }, 1000);
                } else {
                    option.classList.add('bg-error-container', 'border-error');
                    setTimeout(() => {
                        option.classList.remove('bg-error-container', 'border-error');
                    }, 1000);
                }
            });
        });
    </script>




</body>

</html>
