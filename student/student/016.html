    <!-- BottomNavBar -->

    <!-- Micro-interactions Script -->
    <script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });

        // Simulating mic active state
        const micButtons = document.querySelectorAll('.material-symbols-outlined:contains("mic")');
        // Simple helper for demo purposes
        document.querySelectorAll('button').forEach(btn => {
            if (btn.querySelector('span')?.innerText === 'mic') {
                btn.addEventListener('click', function () {
                    const icon = this.querySelector('span');
                    const isRecording = icon.classList.contains('text-error');
                    if (!isRecording) {
                        icon.classList.add('text-error', 'animate-pulse');
                        this.classList.add('bg-error-container');
                    } else {
                        icon.classList.remove('text-error', 'animate-pulse');
                        this.classList.remove('bg-error-container');
                    }
                });
            }
        });
    </script>
