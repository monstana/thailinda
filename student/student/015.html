    <script>
        let selectedStart = null;
        const svg = document.getElementById('drawing-canvas');

        document.querySelectorAll('.match-trigger').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Clear previous selection if clicking another start node
                document.querySelectorAll('.match-trigger').forEach(b => b.classList.remove('ring-4', 'ring-secondary'));

                selectedStart = btn;
                btn.classList.add('ring-4', 'ring-secondary');
            });
        });

        document.querySelectorAll('.target-trigger').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (!selectedStart) return;

                const startId = selectedStart.getAttribute('data-id');
                const targetMatch = btn.getAttribute('data-match');

                if (startId === targetMatch) {
                    // Correct Match
                    createLine(selectedStart, btn, '#006e29'); // Success Green
                    btn.classList.add('bg-tertiary-container', 'chunky-shadow-active');
                    selectedStart.classList.add('bg-tertiary-container', 'chunky-shadow-active');
                    selectedStart.classList.remove('ring-4', 'ring-secondary');

                    // Simple pop effect
                    btn.style.transform = "scale(1.1)";
                    setTimeout(() => btn.style.transform = "scale(1)", 200);

                    selectedStart = null;
                } else {
                    // Wrong Match
                    btn.classList.add('bg-error-container');
                    setTimeout(() => btn.classList.remove('bg-error-container'), 500);
                }
            });
        });

        function createLine(el1, el2, color) {
            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', rect1.right - 10);
            line.setAttribute('y1', rect1.top + rect1.height / 2);
            line.setAttribute('x2', rect2.left + 10);
            line.setAttribute('y2', rect2.top + rect2.height / 2);
            line.setAttribute('stroke', color);
            line.setAttribute('stroke-width', '6');
            line.setAttribute('stroke-linecap', 'round');
            line.setAttribute('stroke-dasharray', '10, 10');

            svg.appendChild(line);
        }

        // Handle window resize to clear lines (for simplicity in this demo)
        window.addEventListener('resize', () => {
            svg.innerHTML = '';
            document.querySelectorAll('.match-trigger, .target-trigger').forEach(b => {
                b.classList.remove('bg-tertiary-container', 'chunky-shadow-active', 'ring-4', 'ring-secondary');
            });
        });
    </script>
</body>
