<body
    class="bg-pattern min-h-screen flex flex-col items-center justify-center font-body-md text-on-background selection:bg-primary-container">
    <main class="w-full max-w-md px-margin-mobile py-8 flex flex-col gap-8">

            <div class="relative w-48 h-48">

            </div>
            <div

                <div
                    class="absolute -top-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-surface-container-lowest rotate-45 border-t-2 border-l-2 border-outline-variant">
                </div>
                <h1 class="font-display-thai text-display-thai text-on-surface-variant text-center">
                    สวัสดี !</h1>
            </div>
        </header>
        <section class="flex flex-col gap-6 w-full">
            <h2 class="font-headline-md text-headline-md text-on-background text-center px-4">
                เลือกบทบาทของคุณเพื่อเริ่มต้น
            </h2>
            <div class="grid grid-cols-1 gap-6">
                <a href="003.html"
                    class="group flex items-center justify-between w-full bg-primary-container p-6 rounded-xl border-2 border-primary chunky-shadow-primary btn-active transition-all">
                    <div class="flex items-center gap-4">
                        <div class="bg-surface-container-lowest p-3 rounded-lg flex items-center justify-center">

                                style="font-variation-settings: 'FILL' 1;">school</span>
                        </div>
                        <span class="font-headline-md text-headline-md text-on-primary-container">ครู</span>
                    </div>
                    <span
                        class="material-symbols-outlined text-on-primary-container text-3xl group-hover:translate-x-1 transition-transform"
                        data-icon="arrow_forward">arrow_forward</span>
                </a>
                <a href="003.html"
                    class="group flex items-center justify-between w-full bg-secondary-container p-6 rounded-xl border-2 border-secondary chunky-shadow-secondary btn-active transition-all">
                    <div class="flex items-center gap-4">
                        <div class="bg-surface-container-lowest p-3 rounded-lg flex items-center justify-center">
                            <span class="material-symbols-outlined text-secondary text-4xl" data-icon="child_care"
                                style="font-variation-settings: 'FILL' 1;">child_care</span>
                        </div>
                        <span class="font-headline-md text-headline-md text-on-secondary-container">นักเรียน</span>
                    </div>
                    <span
                        class="material-symbols-outlined text-on-secondary-container text-3xl group-hover:translate-x-1 transition-transform"
                        data-icon="arrow_forward">arrow_forward</span>
                </a>
                <a href="003.html"
                    class="group flex items-center justify-between w-full bg-tertiary-container p-6 rounded-xl border-2 border-tertiary chunky-shadow-tertiary btn-active transition-all"
                    style="transform: scale(1);">
                    <div class="flex items-center gap-4">
                        <div class="bg-surface-container-lowest p-3 rounded-lg flex items-center justify-center">

    <script>
        // Micro-interaction for mascot eyes following mouse movement slightly
        document.addEventListener('mousemove', (e) => {
            const mascot = document.querySelector('img[data-alt*="mascot"]');
            if (mascot) {
                const rect = mascot.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const moveX = (e.clientX - centerX) / 50;
                const moveY = (e.clientY - centerY) / 50;
                mascot.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });

        // Add haptic-like scale effect to buttons and links
        const buttons = document.querySelectorAll('a.group, button');
        buttons.forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.98)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
